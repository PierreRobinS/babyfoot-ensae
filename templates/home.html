{% extends "base.html" %}
{% block title %}Accueil - Babyfoot ENSAE{% endblock %}
{% block body_class %}home-screen{% endblock %}

{% block content %}
<div class="home-page" data-dashboard>
    <section class="hero-panel home-hero reveal">
        <div
            class="elo-odometer"
            data-elo-odometer
            data-elo-one="{{ current_user.visible_rating_1v1|round|int }}"
            data-elo-two="{{ current_user.visible_rating_2v2|round|int }}"
            aria-live="polite"
            aria-label="1v1 Elo {{ current_user.visible_rating_1v1|round|int }}"
        >
            <span class="elo-odometer-label" data-elo-label>1v1 Elo</span>
            <strong class="elo-odometer-number" data-elo-number>{{ current_user.visible_rating_1v1|round|int }}</strong>
        </div>
        <div class="home-id">
            <img src="{{ current_user.avatar_url }}" alt="">
            <span>
                <small>Babyfoot ENSAE</small>
                <strong>{{ current_user.pseudo }}</strong>
            </span>
        </div>
    </section>

    <section class="panel home-challenge reveal">
        <div class="section-head">
            <h2>Partie</h2>
            <div class="segmented" data-mode-switch>
                <button type="button" class="active" data-mode-target="one">1v1</button>
                <button type="button" data-mode-target="two">2v2</button>
            </div>
        </div>

        <form class="challenge-form active" id="challenge-one" action="{{ url_for('matches.create_1v1') }}" method="post" data-challenge-form data-mode="1v1">
            <div class="autocomplete" data-autocomplete>
                <label>Adversaire</label>
                <input type="text" placeholder="Pseudo, nom ou email" autocomplete="off">
                <input type="hidden" name="opponent_id" data-player-id>
                <div class="suggestions" data-suggestions></div>
            </div>
            <div class="prediction-card hidden" data-prediction="1v1"></div>
            <button class="primary-btn" type="submit">Defier</button>
        </form>

        <form class="challenge-form" id="challenge-two" action="{{ url_for('matches.create_2v2') }}" method="post" data-challenge-form data-mode="2v2">
            <div class="autocomplete" data-autocomplete>
                <label>Partenaire</label>
                <input type="text" placeholder="Pseudo, nom ou email" autocomplete="off">
                <input type="hidden" name="partner_id" data-player-id data-role="partner">
                <div class="suggestions" data-suggestions></div>
            </div>
            <div class="autocomplete" data-autocomplete>
                <label>Adverse 1</label>
                <input type="text" placeholder="Pseudo, nom ou email" autocomplete="off">
                <input type="hidden" name="opponent1_id" data-player-id data-role="opponent1">
                <div class="suggestions" data-suggestions></div>
            </div>
            <div class="autocomplete" data-autocomplete>
                <label>Adverse 2</label>
                <input type="text" placeholder="Pseudo, nom ou email" autocomplete="off">
                <input type="hidden" name="opponent2_id" data-player-id data-role="opponent2">
                <div class="suggestions" data-suggestions></div>
            </div>
            <div class="prediction-card hidden" data-prediction="2v2"></div>
            <button class="primary-btn" type="submit">Inviter</button>
        </form>
    </section>
</div>

<script>
    window.INITIAL_DASHBOARD = {{ dashboard|tojson }};
</script>
{% endblock %}
